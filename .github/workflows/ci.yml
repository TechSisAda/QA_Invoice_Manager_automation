name: InvoiceManager Test Suite

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 1 * * *'   # nightly at 01:00 UTC

jobs:
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run smoke suite
        run: npm run test:smoke
        env:
          BASE_URL: ${{ secrets.STAGING_URL }}
          INSTANCE_URL: ${{ secrets.STAGING_URL }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASS: ${{ secrets.TEST_PASS }}
          HEADLESS: 'true'
      - name: Generate Allure report
        if: always()
        run: npm run report:generate
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-smoke-report
          path: allure-report/

  regression:
    name: Regression Tests
    runs-on: ubuntu-latest
    needs: smoke
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run regression suite
        run: npm run test:regression
        env:
          BASE_URL: ${{ secrets.STAGING_URL }}
          INSTANCE_URL: ${{ secrets.STAGING_URL }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASS: ${{ secrets.TEST_PASS }}
          HEADLESS: 'true'
      - name: Generate Allure report
        if: always()
        run: npm run report:generate
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-regression-report
          path: allure-report/

  nightly-e2e:
    name: Nightly E2E Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run AI agent — e2e suite
        run: node agent/test-runner-agent.js "Run the e2e tests and give me a full report"
        env:
          BASE_URL: ${{ secrets.STAGING_URL }}
          INSTANCE_URL: ${{ secrets.STAGING_URL }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASS: ${{ secrets.TEST_PASS }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HEADLESS: 'true'
      - name: Generate Allure report
        if: always()
        run: npm run report:generate
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-e2e-report
          path: allure-report/

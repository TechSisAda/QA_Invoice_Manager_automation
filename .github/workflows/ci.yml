name: InvoiceManager Test Suite

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 1 * * *'   # nightly at 01:00 UTC

# Shared env vars used by every job
env:
  BASE_URL: ${{ secrets.BASE_URL }}
  INSTANCE_URL: ${{ secrets.INSTANCE_URL }}
  TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
  TEST_PASS: ${{ secrets.TEST_PASS }}
  TEST_FIRST_NAME: ${{ secrets.TEST_FIRST_NAME }}
  TEST_LAST_NAME: ${{ secrets.TEST_LAST_NAME }}
  TEST_PHONE: ${{ secrets.TEST_PHONE }}
  HEADLESS: 'true'

jobs:

  # ── Step 1: Seed the instance with required data ───────────────────────────
  e2e:
    name: E2E Setup (seed data)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run E2E suite
        run: npm run test:e2e
      - name: Generate Allure report
        if: always()
        run: npm run report:generate
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-e2e-report
          path: allure-report/

  # ── Step 2: Verify the critical path is alive ──────────────────────────────
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: e2e
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run smoke suite
        run: npm run test:smoke
      - name: Generate Allure report
        if: always()
        run: npm run report:generate
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-smoke-report
          path: allure-report/

  # ── Step 3: Full regression — checks every detail ─────────────────────────
  regression:
    name: Regression Tests
    runs-on: ubuntu-latest
    needs: smoke
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run regression suite
        run: npm run test:regression
      - name: Generate Allure report
        if: always()
        run: npm run report:generate
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-regression-report
          path: allure-report/
